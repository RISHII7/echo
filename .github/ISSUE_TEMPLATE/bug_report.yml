name: Bug Report
description: Report a reproducible bug or unexpected behavior
title: "fix: "
labels: ["bug", "needs-triage"]
assignees:
  - RISHII7

body:
  - type: markdown
    attributes:
      value: |
        ## Before You Submit
        - Search [existing issues](https://github.com/RISHII7/echo/issues) to avoid duplicates
        - Make sure you're on the latest version
        - Read the [Contributing Guide](https://github.com/RISHII7/echo/blob/main/CONTRIBUTING.md)

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Echo are you running?
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected Area
      description: Which part of the project is affected?
      multiple: true
      options:
        - "apps/web"
        - "apps/widget"
        - "packages/ui"
        - "packages/math"
        - "Build / Tooling"
        - "CI/CD"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "When I click on X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the minimum steps to reliably reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces.
      render: text
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in your environment details.
      value: |
        - OS:
        - Node version:
        - pnpm version:
        - Browser (if applicable):
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, or any other context that may help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
        - label: I am using the latest version
          required: false
